{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">

        <!-- Header -->
        <div class="text-center mb-4 fade-up">
            <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style="margin-bottom:16px; filter: drop-shadow(0 0 16px rgba(0,229,255,0.4));">
                <circle cx="28" cy="28" r="26" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
                <circle cx="28" cy="28" r="18" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
                <circle cx="28" cy="28" r="6" fill="#00e5ff" opacity="0.9"/>
                <path d="M28 8v6M28 42v6M8 28h6M42 28h6" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                <path d="M14.1 14.1l4.2 4.2M37.7 37.7l4.2 4.2M14.1 41.9l4.2-4.2M37.7 18.3l4.2-4.2" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
            </svg>
            <div class="orbitron" style="font-size:1.3rem; font-weight:900; color:#00e5ff; letter-spacing:4px;">ОБРАБОТЧИК СИГНАЛОВ</div>
            <div class="mono" style="font-size:11px; color: var(--text-dim); letter-spacing:3px; margin-top:4px;">ВОЙДИТЕ В АККАУНТ</div>
        </div>

        <!-- Card -->
        <div class="hud-card hud-card-cyan fade-up fade-up-1" style="padding: 2rem;">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="section-title">Идентификация</div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label-hud">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="margin-right:4px">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#4a6a80" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="7" r="4" stroke="#4a6a80" stroke-width="2"/>
                        </svg>
                        Логин
                    </label>
                    <input type="text" name="username" class="form-control" placeholder="username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label-hud">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="margin-right:4px">
                            <rect x="3" y="11" width="18" height="11" rx="2" stroke="#4a6a80" stroke-width="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4" stroke="#4a6a80" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Пароль
                    </label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-hud btn-hud-cyan w-100" style="justify-content:center;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Авторизация
                </button>
            </form>
        </div>

        <div class="text-center mt-3 fade-up fade-up-2">
            <span class="mono" style="font-size:10px; color: var(--text-dim);">ALIEN ANALYTICS CORP © 2226</span>
        </div>

    </div>
</div>

{% endblock %}
